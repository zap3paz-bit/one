<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Garg Classes</title>
<style>
  :root{
    --ink:#131c2e;
    --ink-2:#1d2942;
    --paper:#eef0f3;
    --paper-2:#ffffff;
    --line:#c9cdd6;
    --muted:#5c6472;
    --stamp-red:#b3261e;
    --verify-green:#1f7a56;
    --amber:#a3690a;
    --mono: 'Courier New', Consolas, monospace;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  body{min-height:100vh;}
  .wrap{max-width:960px;margin:0 auto;padding:24px 16px 60px;}
  .wrap, .card{width:100%;}
  input[type=text],input[type=password],select,button{min-height:44px;}
  .btn{min-width:92px;}

  /* Responsive helpers */
  @media (max-width:840px){
    .masthead{flex-direction:column;align-items:flex-start;gap:12px;}
    .masthead .sub{margin-top:4px;}
    .row{flex-direction:column;align-items:stretch;}
    .exam-layout{grid-template-columns:1fr;}
  }
  @media (max-width:720px){
    .role-grid{grid-template-columns:1fr;}
    table{font-size:13px;}
  }
  @media (max-width:680px){
    .card .row{flex-direction:column;align-items:stretch;}
    .card .row > div{min-width:0!important;width:100%;}
    .card .row > div > label{margin-top:16px;}
    .card .row > button{width:100%;}
    .monitor{width:100%;}
    .monitor video{width:100%;}
  }
  @media (max-width:600px){
    .card{padding:22px;}
    .btn{width:100%;}
    .btn.ghost{width:auto;}
    .table-wrapper{overflow-x:auto;}
    table{display:block;width:100%;overflow-x:auto;}
    table thead, table tbody, table tr{display:table;width:100%;table-layout:fixed;}
    table td, table th{word-break:break-word;}
  }

  /* ---------- Header / hall-ticket strip ---------- */
  .masthead{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:3px double var(--ink);
    padding-bottom:10px;margin-bottom:26px;
  }
  .masthead h1{
    font-family:var(--serif);font-size:22px;letter-spacing:0.02em;margin:0;
    font-weight:700;
  }
  .masthead .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.04em;}
  .seal{
    width:44px;height:44px;border:2px solid var(--stamp-red);border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--stamp-red);
    font-family:var(--mono);font-size:9px;font-weight:700;text-align:center;line-height:1.1;
    transform:rotate(-8deg);opacity:0.85;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:2px;
    padding:32px;box-shadow:0 1px 0 var(--line);
  }
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px;}
  @media (max-width:600px){.role-grid{grid-template-columns:1fr;}}
  .role-btn{
    border:1px solid var(--ink);background:var(--paper-2);padding:26px 20px;text-align:left;
    cursor:pointer;font-family:var(--sans);position:relative;transition:background .15s ease;
  }
  .role-btn:hover{background:var(--paper);}
  .role-btn .tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  .role-btn h2{font-family:var(--serif);font-size:19px;margin:6px 0 4px;}
  .role-btn p{margin:0;font-size:13px;color:var(--muted);}

  label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:16px 0 6px;}
  input[type=text],input[type=password],select{
    width:100%;padding:11px 12px;border:1px solid var(--line);background:var(--paper);
    font-family:var(--sans);font-size:14px;color:var(--ink);border-radius:1px;
  }
  input:focus,select:focus,button:focus{outline:2px solid var(--ink-2);outline-offset:1px;}

  .btn{
    font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:.01em;
    padding:12px 22px;border:1px solid var(--ink);background:var(--ink);color:var(--paper-2);
    cursor:pointer;border-radius:1px;
  }
  .btn:hover{background:var(--ink-2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn.ghost:hover{background:var(--paper);}
  .btn.danger{background:var(--stamp-red);border-color:var(--stamp-red);}

  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;}

  /* ---------- Exam layout ---------- */
  .exam-layout{display:grid;grid-template-columns:1fr 250px;gap:20px;}
  @media (max-width:760px){.exam-layout{grid-template-columns:1fr;}}
  .q-progress{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px;}
  .q-text{font-family:var(--serif);font-size:19px;line-height:1.4;margin:10px 0 18px;}
  .opt{
    display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);
    margin-bottom:9px;cursor:pointer;background:var(--paper-2);
  }
  .opt:hover{border-color:var(--ink);}
  .opt.selected{border-color:var(--ink);background:#e7e9ee;}
  .opt input{margin-top:2px;}
  .nav-row{display:flex;justify-content:space-between;margin-top:22px;}

  /* ---------- Monitor / proctor panel ---------- */
  .monitor{
    background:var(--ink);color:#d7dbe4;padding:14px;border-radius:2px;
    font-family:var(--mono);font-size:11px;position:sticky;top:20px;height:fit-content;
  }
  .monitor .rec{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#ff6b60;margin-bottom:8px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#ff6b60;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  .monitor video{width:100%;border-radius:1px;background:#000;display:block;margin-bottom:10px;transform:scaleX(-1);}
  .timer{font-size:22px;color:#fff;margin-bottom:10px;letter-spacing:.03em;}
  .log{max-height:170px;overflow-y:auto;border-top:1px solid #333e58;padding-top:8px;}
  .log-entry{padding:3px 0;color:#9aa2b5;border-bottom:1px dotted #2b3550;}
  .log-entry.warn{color:#ffb84d;}
  .warn-count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;}

  /* ---------- Teacher dashboard ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);}
  th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);cursor:pointer;}
  tr.student-row{cursor:pointer;}
  tr.student-row:hover{background:var(--paper);}
  .score-cell{font-family:var(--mono);font-weight:700;}
  .warn-badge{
    display:inline-block;font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:10px;
  }
  .warn-badge.ok{background:#e2f2ea;color:var(--verify-green);}
  .warn-badge.mid{background:#fbeecd;color:var(--amber);}
  .warn-badge.bad{background:#fbe2e0;color:var(--stamp-red);}

  .detail-panel{margin-top:14px;border-top:2px solid var(--ink);padding-top:16px;}
  .qa-block{border-bottom:1px solid var(--line);padding:14px 0;}
  .qa-block .qtxt{font-family:var(--serif);font-size:15px;margin-bottom:6px;}
  .ans-line{font-size:13px;margin:3px 0;}
  .ans-line.correct{color:var(--verify-green);}
  .ans-line.wrong{color:var(--stamp-red);}
  .expl{font-size:12.5px;color:var(--muted);margin-top:6px;font-style:italic;}

  .empty{color:var(--muted);font-size:13px;padding:20px 0;}
  .center{text-align:center;}
  .stamp-ok{
    display:inline-block;border:2px solid var(--verify-green);color:var(--verify-green);
    padding:10px 22px;font-family:var(--mono);font-weight:700;letter-spacing:.08em;
    transform:rotate(-3deg);margin:22px 0;text-transform:uppercase;font-size:13px;
  }
  .back-link{font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

const storage = {
  async get(key){
    if(window.storage && window.storage.get){
      return await window.storage.get(key, true);
    }
    return { value: localStorage.getItem(key) };
  },
  async set(key, value){
    if(window.storage && window.storage.set){
      return await window.storage.set(key, value, true);
    }
    if(value === null){
      localStorage.removeItem(key);
    } else {
      localStorage.setItem(key, value);
    }
  },
  async list(prefix){
    if(window.storage && window.storage.list){
      return await window.storage.list(prefix, true);
    }
    const keys = [];
    for(const key of Object.keys(localStorage)){
      if(prefix == null || key.startsWith(prefix)) keys.push(key);
    }
    return { keys };
  }
};

}

function renderSetup(){

  document.getElementById("btnBackRole").onclick = ()=>{ state.view="role"; render(); };

    const name = document.getElementById("nameInput").value.trim();
    const cls = document.getElementById("classInput").value;
    if(!name){ alert("Please enter your name to continue."); return; }
    state.studentName = name;
    state.studentClass = cls;
    if(!isAllowedStudent(name, cls)){

function getAvailablePapers(cls){
  return BUILT_IN_PAPERS.filter(p=>p.cls===cls).concat(state.teacherPapers.filter(p=>p.cls===cls));

function getPaperById(id){
  return BUILT_IN_PAPERS.concat(state.teacherPapers).find(p=>p.id===id) || null;
}

function normalizeStudentName(name){
  return String(name || "").trim().toLowerCase();
}

function findStudentRosterEntry(name, cls){
  if(!state.studentRoster || state.studentRoster.length === 0) return null;
  const normalized = normalizeStudentName(name);
  return state.studentRoster.find(s=> normalizeStudentName(s.name) === normalized && s.cls === cls) || null;
}

function isAllowedStudent(name, cls){
  if(!state.studentRoster || state.studentRoster.length === 0) return true;
  return !!findStudentRosterEntry(name, cls);
}

/* ---------- Proctoring: tab switch, audio spike, motion ---------- */
function setupProctoring(){
  document.addEventListener("visibilitychange", onVisibilityChange);
  window.addEventListener("blur", onWindowBlur);

  // Audio volume spike detection
  try{
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioCtx.createMediaStreamSource(state.mediaStream);
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 512;
    source.connect(state.analyser);
    const data = new Uint8Array(state.analyser.frequencyBinCount);
    state.audioCheckHandle = setInterval(()=>{
      state.analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0)/data.length;
      if(avg > 55){
        logWarning("audio","Elevated audio level detected (possible talking/noise)");
      }
    },2500);
  }catch(e){ /* audio context may fail silently; ignore */ }

  // Frame motion detection via canvas diffing
  const canvas = document.createElement("canvas");
  canvas.width = 64; canvas.height = 48;
  const ctx = canvas.getContext("2d");
  const hiddenVideo = document.createElement("video");
  hiddenVideo.srcObject = state.mediaStream;
  hiddenVideo.muted = true;
  hiddenVideo.playsInline = true;
  hiddenVideo.play().catch(()=>{});

  state.frameCheckHandle = setInterval(()=>{
    if(hiddenVideo.readyState < 2) return;
    ctx.drawImage(hiddenVideo,0,0,64,48);
    let frame;
    try{ frame = ctx.getImageData(0,0,64,48).data; } catch(e){ return; }
    if(state.lastFrameData){
      let diff = 0;
      for(let i=0;i<frame.length;i+=16){
        diff += Math.abs(frame[i]-state.lastFrameData[i]);
      }
      const diffScore = diff / (frame.length/16);
      if(diffScore < 1.2){
        state.noMotionStreak++;
        if(state.noMotionStreak === 4){
          logWarning("motion","No movement detected &mdash; candidate may have stepped away");
        }
      } else {
        state.noMotionStreak = 0;
        if(diffScore > 40){
          logWarning("motion","Large sudden movement detected");
        }
      }
    }
    state.lastFrameData = frame;
  },3000);
}

function onVisibilityChange(){
  if(document.hidden && state.view === "exam"){
    logWarning("tab","Tab switched away / minimized");
  }
}
function onWindowBlur(){
  if(state.view === "exam"){
    logWarning("focus","Window lost focus");
  }
}

function teardownProctoring(){
  document.removeEventListener("visibilitychange", onVisibilityChange);
  window.removeEventListener("blur", onWindowBlur);
  if(state.frameCheckHandle) clearInterval(state.frameCheckHandle);
  if(state.audioCheckHandle) clearInterval(state.audioCheckHandle);
  if(state.audioCtx) try{ state.audioCtx.close(); }catch(e){}
  if(state.mediaStream) state.mediaStream.getTracks().forEach(t=>t.stop());
}

async function beginStudentReview(){
  await loadStudentResults();
  state.studentReviewSelectedId = null;
  state.view = "studentReview";
  render();
}

async function loadStudentResults(){
  try{
    const listRes = await storage.list("result:");
    const keys = (listRes && listRes.keys) ? listRes.keys : [];
    const results = await Promise.all(keys.map(async k=>{
      try{
        const r = await storage.get(k);
        return r && r.value ? JSON.parse(r.value) : null;
      }catch(e){ return null; }
    }));
    state.studentReviewResults = results.filter(Boolean).filter(r=>r.name === state.studentName && r.cls === state.studentClass)
      .sort((a,b)=> new Date(b.submittedAt) - new Date(a.submittedAt));
  }catch(e){
    console.error("Failed to load student results:", e);
    state.studentReviewResults = [];
  }
}

async function submitExam(){
  if(state.timerHandle) clearInterval(state.timerHandle);
  teardownProctoring();

  let score = 0;
  const breakdown = state.questions.map((q,i)=>{
    const chosen = state.answers[i];
    const isCorrect = chosen === q.correct;
    if(isCorrect) score++;
    return {
      q: q.q,
      opts: q.opts,
      chosen: chosen,
      correct: q.correct,
      expl: q.expl,
      isCorrect
    };
  });

  const rosterEntry = findStudentRosterEntry(state.studentName, state.studentClass);
  const result = {
    id: `result:${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
    name: state.studentName,
    cls: state.studentClass,
    paperId: state.selectedPaper.id,
    paperTitle: state.selectedPaper.title,
    paperSubject: state.selectedPaper.subject,
    score,
    total: state.questions.length,
    pct: Math.round((score/state.questions.length)*100),
    warnings: state.warnings,
    warnCount: state.warnings.length,
    phone: rosterEntry ? rosterEntry.phone : '',
    submittedAt: new Date().toISOString(),
    breakdown
  };

  try{
    await storage.set(result.id, JSON.stringify(result));
  }catch(e){
    console.error("Could not save result:", e);
  }

  state.lastResult = result;
  state.smsStatus = 'Sending SMS...';
  state.view = "done";
  render();
  notifyBySmsAuto(result);
}

function normalizePhone(raw){
  if(!raw) return raw;
  let digits = raw.replace(/[^\d+]/g, '');
  if(digits.startsWith('+')) return digits;
  digits = digits.replace(/^0+/, '');
  if(digits.length === 10) return `+91${digits}`;
  if(digits.length === 12 && digits.startsWith('91')) return `+${digits}`;
  return `+${digits}`;
}

function validatePaperDraft(draft){
  if(!draft.title.trim()) return "Please enter a title for the paper.";
  if(!draft.questions.length) return "A paper must contain at least one question.";
  if(draft.scopeType === "Chapter" && !draft.chapter.trim()) return "Please enter a chapter or module name for chapter-level coverage.";
  const hasSchedule = draft.scheduleDate || draft.scheduleStart || draft.scheduleEnd;
  if(hasSchedule){
    if(!draft.scheduleDate) return "Please select an exam date.";
    if(!draft.scheduleStart) return "Please select a start time.";
    if(!draft.scheduleEnd) return "Please select an end time.";
    if(draft.scheduleStart >= draft.scheduleEnd) return "End time must be after the start time.";
  }
  for(const [index,q] of draft.questions.entries()){
    if(!q.q.trim()) return `Question ${index+1} needs text.`;
    if(q.opts.some(opt=>!opt.trim())) return `All four options must be filled for question ${index+1}.`;
    if(q.correct < 0 || q.correct > 3) return `Select a correct option for question ${index+1}.`;
  }
  return "";
}

async function savePaperDraft(){
  syncTeacherDraftFromForm();
  const draft = state.teacherPaperDraft;
  if(!draft) return;
  const error = validatePaperDraft(draft);
  if(error){ alert(error); return; }
  if(state.teacherEditingId){
    state.teacherPapers = state.teacherPapers.map(p=> p.id === state.teacherEditingId ? {...draft, id: state.teacherEditingId} : p);
  } else {
    state.teacherPapers = [...state.teacherPapers, {...draft}];
  }
  await saveTeacherPapers();
  state.teacherPaperDraft = null;
  state.teacherEditingId = null;
  await loadTeacherPapers();
  render();
}

  if(!confirm("Delete this custom paper? This cannot be undone.")) return;
  state.teacherPapers = state.teacherPapers.filter(p=>p.id !== id);
  await saveTeacherPapers();
  if(state.teacherEditingId === id) clearPaperForm();
  render();
}

/* ============================================================
   UTILITIES
   ============================================================ */
function parseQuestionsFromFile(file){
  const fileName = file.name.toLowerCase();
  const statusEl = document.getElementById('uploadStatus');
  const setStatus = (msg)=>{ if(statusEl) statusEl.textContent = msg; };

  // Structured formats: parsed instantly, no AI call needed.
  if(fileName.endsWith('.json') || fileName.endsWith('.csv')){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const text = reader.result;
          let items;
          if(fileName.endsWith('.json')) items = JSON.parse(text);
          else items = parseCsvQuestions(text);
          if(!Array.isArray(items)) throw new Error('Uploaded file must contain an array of questions.');
          resolve(items.map(normalizeQuestionItem));
        }catch(err){ reject(err); }
      };
      reader.onerror = ()=>reject(reader.error || new Error('File read failed.'));
      reader.readAsText(file);
    });
  }

  // Everything else (TXT, PDF, DOCX, images) goes through the AI interpreter.
  setStatus('Reading file…');
  if(fileName.endsWith('.pdf')){
    return fileToBase64(file).then(b64=>{
      setStatus('Interpreting PDF with AI… this can take a moment.');
      return extractQuestionsWithAI({ kind:'document', mediaType:'application/pdf', base64:b64 });
    }).finally(()=>setStatus(''));
  }
  if(fileName.endsWith('.jpg') || fileName.endsWith('.jpeg') || fileName.endsWith('.png') || fileName.endsWith('.webp')){
    const mediaType = fileName.endsWith('.png') ? 'image/png' : fileName.endsWith('.webp') ? 'image/webp' : 'image/jpeg';
    return fileToBase64(file).then(b64=>{
      setStatus('Interpreting image with AI… this can take a moment.');
      return extractQuestionsWithAI({ kind:'image', mediaType, base64:b64 });
    }).finally(()=>setStatus(''));
  }
  if(fileName.endsWith('.docx')){
    return fileToArrayBuffer(file).then(async buf=>{
      if(!window.mammoth) throw new Error('DOCX reader failed to load. Please retry.');
      setStatus('Reading Word document…');
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      const text = result.value || '';
      if(!text.trim()) throw new Error('Could not find any text in this DOCX file.');
      setStatus('Interpreting document with AI… this can take a moment.');
      return extractQuestionsWithAI({ kind:'text', text });
    }).finally(()=>setStatus(''));
  }
  // Plain TXT, or anything else: try as text through the AI interpreter.
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = ()=>reject(reader.error || new Error('File read failed.'));
    reader.readAsText(file);
  }).then(text=>{
    setStatus('Interpreting with AI… this can take a moment.');
    return extractQuestionsWithAI({ kind:'text', text });
  }).finally(()=>setStatus(''));
}

function normalizeQuestionItem(item, index){
  if(typeof item !== 'object' || item === null) throw new Error(`Question ${index+1} is malformed.`);
  const qText = String(item.q || item.question || item.text || '').trim();
  const optsSource = item.opts || item.options || [item.opt1, item.opt2, item.opt3, item.opt4];
  const opts = Array.isArray(optsSource) ? optsSource.slice(0,4).map(o=>String(o||'').trim()) : [item.opt1, item.opt2, item.opt3, item.opt4].map(o=>String(o||'').trim());
  while(opts.length < 4) opts.push('');
  const correctValue = item.correct ?? item.answer ?? item.correctIndex ?? item.correctOption ?? item.correctAnswer;
  const correct = parseInt(correctValue, 10);
  const expl = String(item.expl || item.explanation || '').trim();
  return { q: qText, opts, correct: isNaN(correct)?0:correct, expl };
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = ()=>reject(reader.error || new Error('File read failed.'));
    reader.readAsDataURL(file);
  });
}
function fileToArrayBuffer(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = ()=>reject(reader.error || new Error('File read failed.'));
    reader.readAsArrayBuffer(file);
  });
}

/* AI-powered question extraction: works on scanned/handwritten/typed papers
   in any layout via image or PDF input, or on plain extracted text (from DOCX/TXT). */
async function extractQuestionsWithAI({ kind, mediaType, base64, text }){
  const instructions = `You are extracting multiple-choice questions from a school question paper (may be handwritten, scanned, or typed, in any layout). Return ONLY a JSON array, nothing else — no markdown fences, no commentary. Each element must be an object exactly like:
{"q": "question text", "opts": ["option A text","option B text","option C text","option D text"], "correct": 0, "expl": "one short sentence explaining why that answer is correct"}
Rules:
- "correct" is the 0-indexed position of the right option within "opts".
- If the correct answer is not marked anywhere in the source, use your own subject knowledge to determine the right answer.
- If an explanation is not given in the source, write a brief, accurate one yourself.
- Always output exactly 4 options per question, even if the source used fewer (in that case add clearly implausible distractors).
- Skip anything that isn't a genuine question.
- If you cannot find any valid questions, return [].`;

  const contentBlocks = [];
  if(kind === 'image'){
    contentBlocks.push({ type:'image', source:{ type:'base64', media_type: mediaType, data: base64 } });
  } else if(kind === 'document'){
    contentBlocks.push({ type:'document', source:{ type:'base64', media_type: mediaType, data: base64 } });
  }
  const textPart = kind === 'text' ? `${instructions}\n\nSource text:\n${text}` : instructions;
  contentBlocks.push({ type:'text', text: textPart });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      messages: [{ role:'user', content: contentBlocks }]
    })
  });
  if(!response.ok){
    throw new Error(`AI extraction request failed (${response.status}).`);
  }
  const data = await response.json();
  const textBlocks = (data.content || []).filter(b=>b.type === 'text').map(b=>b.text).join('\n');
  const cleaned = textBlocks.replace(/```json|```/g, '').trim();
  let items;
  try{
    items = JSON.parse(cleaned);
  }catch(err){
    throw new Error('AI could not return readable question data. Try a clearer photo/scan, or enter questions manually.');
  }
  if(!Array.isArray(items) || items.length === 0){
    throw new Error('No questions could be identified in this file.');
  }
  return items.map(normalizeQuestionItem);
}

function parseCsvQuestions(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return [];
  const headerParts = lines[0].split(/,\s*/).map(h=>h.trim().toLowerCase());
  const result = [];
  for(let i=1;i<lines.length;i++){
    const line = lines[i];
    const cols = parseCsvLine(line);
    const row = {};
    for(let j=0;j<Math.min(headerParts.length, cols.length); j++){
      row[headerParts[j]] = cols[j];
    }
    result.push(row);
  }
  return result.map(row => ({
    q: String(row.question || row.q || row.text || '').trim(),
    opts: [String(row.opt1 || row.option1 || row.a || '').trim(), String(row.opt2 || row.option2 || row.b || '').trim(), String(row.opt3 || row.option3 || row.c || '').trim(), String(row.opt4 || row.option4 || row.d || '').trim()],
    correct: isNaN(parseInt(row.correct, 10)) ? 0 : parseInt(row.correct, 10),
    expl: String(row.expl || row.explanation || '').trim()
  }));
}

function parseCsvLine(line){
  const values = [];
  let current = '';
  let inQuotes = false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch === '"'){
      if(inQuotes && line[i+1] === '"'){
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(ch === ',' && !inQuotes){
      values.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  values.push(current);
  return values;
}

function downloadFile(name, content, type){
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadResultReport(result){
  if(!result) return;
  const lines = [
    `Result report for ${result.name}`,
    `Class: ${result.cls}`,
    `Paper: ${result.paperTitle}`,
    `Subject: ${result.paperSubject}`,
    `Score: ${result.score}/${result.total}`,
    `Percentage: ${result.pct}%`,
    `Proctoring flags: ${result.warnCount}`,
    `Phone: ${result.phone}`,
    `Submitted: ${new Date(result.submittedAt).toLocaleString()}`,
    '',
    'Question breakdown:'
  ];
  result.breakdown.forEach((b,i)=>{
    lines.push(`\n${i+1}. ${b.q}`);
    lines.push(`  Your answer: ${b.chosen===null||b.chosen===undefined ? 'Not answered' : b.opts[b.chosen]}`);
    lines.push(`  Correct answer: ${b.opts[b.correct]}`);
    lines.push(`  Status: ${b.isCorrect ? 'Correct' : 'Incorrect'}`);
    if(b.expl) lines.push(`  Explanation: ${b.expl}`);
  });
  downloadFile(`result-${result.id}.txt`, lines.join('\n'), 'text/plain');
}

async function notifyBySmsAuto(result){
  if(!result){
    return;
  }
  if(!result.phone){
    state.smsStatus = 'No teacher phone configured; SMS not sent.';
    state.lastResult.smsStatus = state.smsStatus;
    render();
    return;
  }

  const normalizedPhone = normalizePhone(result.phone);

  const apiOrigin = state.smsBackendUrl
    ? state.smsBackendUrl
    : (window.location.protocol === 'file:' || window.location.origin === 'null') ? 'http://localhost:8000' : window.location.origin;
  const apiUrl = `${apiOrigin}/api/send-sms`;

  try{
    const response = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: normalizedPhone,
        body: `Hello ${result.name}, your ${result.paperTitle} score is ${result.score}/${result.total} (${result.pct}%). Review at Garg Classes.`
      })
    });

    const text = await response.text();
    let data = {};
    try{ data = text ? JSON.parse(text) : {}; }catch(e){ data = { error: text }; }

    if(!response.ok){
      throw new Error(data.error || text || `HTTP ${response.status}`);
    }

    state.smsStatus = 'SMS request sent successfully.';
    state.lastResult.smsStatus = 'SMS sent successfully.';
    render();
    console.log('SMS request sent successfully.', data);
  }catch(err){
    state.smsStatus = 'SMS send failed: ' + (err.message || err);
    state.lastResult.smsStatus = state.smsStatus;
    render();
    console.warn('SMS send failed:', err);
  }
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function formatTime(s){
  const m = Math.floor(s/60);
  const sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}
